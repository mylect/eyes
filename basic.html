<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基本情報入力 | Mylect</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="badge">MYLECT FIRST STEP</div>

      <h1>基本情報を入力する</h1>

      <p>
        Mylectを始めるために、まずは睡眠・食事・ストレス・体調傾向などの基本情報を入力してください。
      </p>

      <div id="status" class="status">
        LINEアカウント情報を確認しています。
      </div>

      <form id="mylectForm" method="GET">
        <input type="hidden" name="action" value="openForm" />
        <input type="hidden" name="mode" value="basic" />
        <input type="hidden" id="userIdInput" name="userId" value="" />

        <button id="openButton" class="button" type="submit" disabled>
          基本情報フォームへ進む
        </button>
      </form>

      <a class="back-link" href="./index.html">トップに戻る</a>

      <p class="notice">
        入力後、Mylectがあなたの基本情報を受け取り、日次チェックの準備が整います。
      </p>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
