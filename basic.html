<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>基本情報入力 | Mylect</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-card compact">
      <div class="brand-pill">
        <span class="brand-dot"></span>
        MYLECT FIRST STEP
      </div>

      <h1>
        基本情報の入力
      </h1>

      <p class="lead">
        Mylectを始めるために、まずはあなたの基本情報を入力してください。
        睡眠・食事・ストレス・体調の傾向を把握するための初回フォームです。
      </p>

      <div id="status" class="status-box">
        準備中です。下のボタンからフォーム画面に進んでください。
      </div>

      <button id="openButton" class="main-button" data-mode="basic">
        基本情報フォームへ進む
      </button>

      <a class="text-link" href="./index.html">トップに戻る</a>

      <div class="notice">
        入力後、LINEに基本情報の受付メッセージが届きます。
      </div>
    </section>

    <footer class="footer">
      Mylect / Basic information
    </footer>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
