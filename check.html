<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日次チェック | Mylect</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="badge">MYLECT DAILY CHECK</div>

      <h1>今日の状態を記録する</h1>

      <p>
        今日の睡眠・ストレス・体調・気分を1分で記録します。5回分たまるごとにAI分析が届きます。
      </p>

      <div id="status" class="status">
        LINEアカウント情報を確認しています。
      </div>

      <button id="openButton" class="button" data-mode="check">
        日次チェックフォームへ進む
      </button>

      <a class="back-link" href="./index.html">トップに戻る</a>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
