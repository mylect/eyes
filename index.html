<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mylect</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="badge">MYLECT CARE CHECK</div>

      <h1>今日の自分を、すこし丁寧に見つめる。</h1>

      <p>
        Mylectは、日々の睡眠・食事・ストレス・体調の変化を記録し、
        看護的な視点とAIでコンディション傾向を整理するサービスです。
      </p>

      <div class="link-list">
        <a class="menu-card" href="./basic.html">
          <span>FIRST STEP</span>
          基本情報を入力する
        </a>

        <a class="menu-card" href="./check.html">
          <span>DAILY CHECK</span>
          今日の状態を記録する
        </a>
      </div>

      <p class="notice">
        Mylectは医療診断ではありません。強い痛み、息苦しさ、高熱の持続、意識障害などがある場合は、医療機関や救急相談を利用してください。
      </p>
    </section>
  </main>
</body>
</html>
